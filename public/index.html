<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <h1>Student Manager</h1>

    <div class="container">
      <h2>Add Student</h2>
      <form id="studentForm">
        <label for="studentName">Student Name:</label>
        <input type="text" id="studentName" name="studentName" required />
        <label for="rollNumber">Roll Number:</label>
        <input type="text" id="rollNumber" name="rollNumber" required />
        <button type="submit">Add Student</button>
      </form>
    </div>

    <div class="students-section">
      <h2>Students List</h2>
      <ul id="studentsList"></ul>
    </div>

    <script>
      // Load students when page loads
      window.onload = loadStudents;

      // Handle form submission
      document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const studentName = document.getElementById('studentName').value;
        const rollNumber = document.getElementById('rollNumber').value;
        
        try {
          const response = await fetch('/addStudent', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ studentName, rollNumber }),
          });
          
          const data = await response.json();
          
          if (response.ok) {
            alert('Student added successfully!');
            document.getElementById('studentForm').reset();
            loadStudents(); // Reload the list
          } else {
            alert('Error: ' + data.message);
          }
        } catch (error) {
          console.error('Error:', error);
          alert('An error occurred while adding student.');
        }
      });

      // Load students from server
      async function loadStudents() {
        try {
          const response = await fetch('/students');
          const students = await response.json();
          
          const list = document.getElementById('studentsList');
          list.innerHTML = '';
          
          if (students.length === 0) {
            list.innerHTML = '<li>No students found</li>';
          } else {
            students.forEach(student => {
              const li = document.createElement('li');
              li.innerHTML = `
                <span class="student-name">${student.studentName}</span>
                <span class="student-roll"> - Roll #: ${student.rollNumber}</span>
                <button onclick="editStudent('${student._id}', '${student.studentName.replace(/'/g, "&#39;")}', '${student.rollNumber.replace(/'/g, "&#39;")}')">Edit</button>
                <button onclick="deleteStudent('${student._id}')">Delete</button>
              `;
              list.appendChild(li);
            });
          }
        } catch (error) {
          console.error('Error:', error);
          document.getElementById('studentsList').innerHTML = '<li>Error loading students</li>';
        }
      }
      // Edit student handler
      window.editStudent = function(id, currentName, currentRoll) {
        const newName = prompt('Edit student name:', currentName);
        if (newName && newName.trim() !== '' && newName !== currentName) {
          const newRoll = prompt('Edit roll number:', currentRoll);
          if (newRoll && newRoll.trim() !== '') {
            fetch(`/students/${id}`, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ studentName: newName, rollNumber: newRoll }),
            })
              .then(response => response.json())
              .then(data => {
                if (data && !data.message) {
                  alert('Student updated successfully!');
                  loadStudents();
                } else {
                  alert('Error: ' + (data.message || 'Could not update student.'));
                }
              })
              .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while updating student.');
              });
          }
        } else if (newName && newName.trim() !== '') {
          const newRoll = prompt('Edit roll number:', currentRoll);
          if (newRoll && newRoll.trim() !== '') {
            fetch(`/students/${id}`, {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ studentName: currentName, rollNumber: newRoll }),
            })
              .then(response => response.json())
              .then(data => {
                if (data && !data.message) {
                  alert('Student updated successfully!');
                  loadStudents();
                } else {
                  alert('Error: ' + (data.message || 'Could not update student.'));
                }
              })
              .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while updating student.');
              });
          }
        }
      };

      // Delete student handler
      window.deleteStudent = function(id) {
        if (confirm('Are you sure you want to delete this student?')) {
          fetch(`/students/${id}`, {
            method: 'DELETE',
          })
            .then(response => response.json())
            .then(data => {
              if (data && data.message === 'Student deleted successfully') {
                alert('Student deleted successfully!');
                loadStudents();
              } else {
                alert('Error: ' + (data.message || 'Could not delete student.'));
              }
            })
            .catch(error => {
              console.error('Error:', error);
              alert('An error occurred while deleting student.');
            });
        }
      };
    </script>
  </body>
</html>
